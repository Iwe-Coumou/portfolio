<!doctype html>
<html>
  {% include "head"%}
  <body>
    {% include "nav"%}
    <article>
      <h1>Blog Post Title</h1>
      <div class="post-meta">
        <div class="post-tags"></div>
        <span class="post-date">March 5th 2026</span>
      </div>
      <script>
        const tags = "finance, databases, python".split(",").map(t => t.trim());
        const container = document.querySelector(".post-tags");
        container.innerHTML = tags.map(t => `<span class="topic">${t}</span>`).join(" ");
      </script>
      <div><p>*content here*</p></div>
    </article>
    {% include "page-nav"%}
  </body>
</html>
