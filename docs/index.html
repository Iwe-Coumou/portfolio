  <script>
    async function loadRepoInfo(repo, elementId) {
      const response = await fetch(`https://api.github.com/repos/Iwe-Coumou/${repo}`);
      const data = await response.json();
      const el = document.getElementById(elementId);
      if (el && data.stargazers_count !== undefined) {
        el.innerHTML = `⭐ ${data.stargazers_count} stars · 🍴 ${data.forks_count} forks · ${data.language}`;
      }
    }
  </script>
