<div class="project-card">
  <div class="project-card-content">
    <h3><a href="/{{ url }}">{{ title }}</a></h3>
    <p>{{ description }}</p>
    <div class="post-card-meta topics-container"></div>
    <script>
      {
        const containers = document.querySelectorAll(".topics-container");
        const container = containers[containers.length - 1];
        const topics = "{{ topics }}".split(",").map(t => t.trim());
        container.innerHTML = topics.map(t => `<span class="topic">${t}</span>`).join(" ");
      }
    </script>
  </div>
</div>
