<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }} | Iwe Coumou</title>
    <link href="/index.css" rel="stylesheet" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
  </head>
  <body>
    <nav>
      <img src="/images/favicon-32x32.png" alt="logo" />
      <a href="/">Home</a>
      <a href="/about">About</a>
      <a href="/education">Education</a>
      <a href="/projects">Projects</a>
      <a href="/skills">Skills</a>
      <a href="/blog">Blog</a>
      <a href="/contact">Contact</a>
    </nav>
    <article>
      <h1>{{ title }}</h1>
      <div class="post-meta">
        <span class="post-date">{{ date }}</span>
        <div class="post-tags"></div>
      </div>
      <script>
        const tags = "{{ tags }}".split(",").map(t => t.trim());
        const container = document.querySelector(".post-tags");
        container.innerHTML = tags.map(t => `<span class="topic">${t}</span>`).join(" ");
      </script>
      {{ Content }}
    </article>
    <div class="page-nav">
      <a href="/{{ prev }}">← {{ prev_label }}</a>
      <a href="/{{ next }}">{{ next_label }} →</a>
    </div>
  </body>
</html>
